# ---------------------------------------------------------------------------
# 7. MARKER REGISTRY SCHEMA
# ---------------------------------------------------------------------------
# The Python implementation bundles all markers in a MarkerSet frozen
# dataclass with 12 categories. This section documents the schema
# so that third-party implementations can build compatible marker sets.
# ---------------------------------------------------------------------------

marker_schema:
  description: >
    A complete marker set for one language. All fields are required.
    Markers are plain data — no models, no magic.
  fields:
    - { name: "vague_adjectives", type: "frozenset[str]", used_by: "vagueness" }
    - { name: "authority_phrases", type: "list[str]", used_by: "authority_claims" }
    - { name: "urgency_patterns", type: "list[str]", used_by: "urgency_fear" }
    - { name: "fear_words", type: "list[str]", used_by: "emotional_manipulation" }
    - { name: "euphoria_words", type: "list[str]", used_by: "emotional_manipulation" }
    - { name: "contradiction_pairs", type: "list[tuple[str, list[str], list[str]]]", used_by: "logical_contradictions" }
    - { name: "unfalsifiable_source_phrases", type: "list[str]", used_by: "source_attribution" }
    - { name: "unnamed_authority_phrases", type: "list[str]", used_by: "source_attribution" }
    - { name: "verifiable_citation_markers", type: "list[str]", used_by: "source_attribution" }
    - { name: "commitment_escalation_markers", type: "list[tuple[int, list[str]]]", used_by: "commitment_escalation" }
    - { name: "cooccurrence_groups", type: "list[tuple[str, list[str]]]", used_by: "authority_claims" }
    - { name: "sciencewashing_phrases", type: "list[str]", used_by: "authority_claims" }
  supported_languages:
    - { code: "en", spacy_model: "en_core_web_sm" }
    - { code: "ja", spacy_model: "ja_core_news_sm" }

# ---------------------------------------------------------------------------
# 8. ENGINE TIERS
# ---------------------------------------------------------------------------
# The topology module supports multiple analysis engines with different
# trade-offs between local-only processing and extraction quality.
# ---------------------------------------------------------------------------

engines:
  - tier: 0
    name: "RuleEngine"
    description: "Local, deterministic. Uses spaCy + marker heuristics. No API keys needed."
    local_only: true
    dependencies: ["spacy"]

  - tier: 1
    name: "AnthropicEngine"
    description: "Claude API-based extraction. Higher quality, requires API key."
    local_only: false
    dependencies: ["anthropic"]

  - tier: 2
    name: "OllamaEngine"
    description: "Stub for future local-LLM integration. Not yet functional."
    local_only: true
    dependencies: ["ollama"]
    status: "stub"

# ---------------------------------------------------------------------------
# 9. DATA SOVEREIGNTY PRINCIPLES
# ---------------------------------------------------------------------------
# These principles govern all SI Protocols tools and are non-negotiable.
# ---------------------------------------------------------------------------

data_sovereignty:
  principles:
    - >
      SI tools never transmit user text to external servers.
      Analysis runs on the user's own machine.
    - >
      The Claude Skill (Quick-Check) runs on Anthropic's infrastructure,
      not ours. This is disclosed wherever the Skill is referenced.
    - >
      An intelligence organisation that collects the data it claims to
      help you protect is structurally compromised. The tools are the gift.
      The intelligence is the service. The data is yours.
  exceptions:
    - tool: "Quick-Check Skill"
      runs_on: "Anthropic infrastructure"
      disclosure: "Required in all published references"
      privacy_link: "https://www.anthropic.com/privacy"
    - tool: "AnthropicEngine (Tier 1)"
      runs_on: "Anthropic API"
      disclosure: "User must explicitly opt in via --engine anthropic"
