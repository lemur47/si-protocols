  - id: "conspirituality"
    name: "Conspirituality"
    name_ja: "陰謀論スピ"
    description: "Conspiracy theories merged with spiritual framing"

  - id: "commercial_exploitation"
    name: "Commercial exploitation"
    name_ja: "霊感商法"
