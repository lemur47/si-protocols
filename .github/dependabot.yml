version: 2
updates:
  # Python (uv.lock)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    assignees:
      - lemur47
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # npm — site/
  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: weekly
    assignees:
      - lemur47
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Pinned to v7 alongside Astro v5 — see Sprint 4 Decision
      # "Defer @astrojs/svelte v8 / Astro v6 major bump" (2026-04-20).
      # Lift when executing the Sprint 5 Astro v6 coordinated-upgrade WI.
      - dependency-name: "@astrojs/svelte"
        update-types: ["version-update:semver-major"]

  # npm — site-cc/
  - package-ecosystem: npm
    directory: /site-cc
    schedule:
      interval: weekly
    assignees:
      - lemur47
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Pinned to v7 alongside Astro v5 — see Sprint 4 Decision
      # "Defer @astrojs/svelte v8 / Astro v6 major bump" (2026-04-20).
      # Lift when executing the Sprint 5 Astro v6 coordinated-upgrade WI.
      - dependency-name: "@astrojs/svelte"
        update-types: ["version-update:semver-major"]
