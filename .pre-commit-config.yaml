repos:
  # --- Ruff: lint + format ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # --- Gitleaks: secret scanning ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        args: ["dir", "--config=.gitleaks.toml", "--verbose"]

  # --- Opengrep: SAST scanning ---
  - repo: local
    hooks:
      - id: opengrep
        name: opengrep
        entry: opengrep scan --config auto --error src/ app/
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  # --- OSV-Scanner: dependency vulnerability scanning ---
  - repo: local
    hooks:
      - id: osv-scanner
        name: osv-scanner
        entry: osv-scanner scan source --config=osv-scanner.toml --recursive .
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  # --- Pyright: type checking ---
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  # --- Pytest: run tests on commit ---
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest --tb=short -q
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  # Type checking - Astro (site/ only)
  - repo: local
    hooks:
      - id: astro-check-site
        name: astro check (site)
        entry: bash -c 'cd site && npx astro check'
        language: system
        pass_filenames: false
        files: ^site/
      - id: astro-check-site-cc
        name: astro check (site-cc)
        entry: bash -c 'cd site-cc && npx astro check'
        language: system
        pass_filenames: false
        files: ^site-cc/

  # --- Classification gate (file name and content) ---
  - repo: local
    hooks:
      - id: classification-gate
        name: SI classification gate
        entry: python scripts/classification-gate.py
        language: python
        always_run: true
        pass_filenames: false

  # --- General hygiene ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: detect-private-key
