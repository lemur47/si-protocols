<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'Courier New','Lucida Console',monospace">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#fff" opacity="0.015"/>
    </pattern>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffa3" opacity="0.8"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8888a0" opacity="0.6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="440" fill="#0a0a0f"/>
  <rect width="800" height="440" fill="url(#scan)"/>

  <!-- HUD Frame corners -->
  <path d="M 24 8 L 8 8 L 8 36" stroke="#00ffa3" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 776 8 L 792 8 L 792 36" stroke="#00ffa3" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 8 408 L 8 432 L 24 432" stroke="#00ffa3" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 792 408 L 792 432 L 776 432" stroke="#00ffa3" stroke-width="1.5" fill="none" opacity="0.5"/>
  <rect x="4" y="4" width="792" height="432" rx="2" fill="none" stroke="#2a2a3a" stroke-width="0.5"/>

  <!-- Title bar -->
  <line x1="20" y1="44" x2="780" y2="44" stroke="#2a2a3a" stroke-width="0.5"/>
  <text x="28" y="30" fill="#00ffa3" font-size="11" font-weight="bold" letter-spacing="2">SI-PROTOCOLS // ARCHITECTURE OVERVIEW</text>
  <text x="772" y="30" fill="#8888a0" font-size="9" text-anchor="end" letter-spacing="1">SYSTEM SCHEMATIC</text>

  <!-- ==================== INPUT ==================== -->
  <rect x="320" y="58" width="160" height="36" rx="3" fill="#12121a" stroke="#00ffa3" stroke-width="0.8"/>
  <text x="400" y="80" fill="#00ffa3" font-size="10" text-anchor="middle" font-weight="bold">TEXT INPUT</text>
  <text x="400" y="80" fill="#00ffa3" font-size="10" text-anchor="middle" font-weight="bold" filter="url(#glow)" opacity="0.4">TEXT INPUT</text>

  <!-- Arrow: input → shared layer -->
  <line x1="400" y1="94" x2="400" y2="112" stroke="#00ffa3" stroke-width="1" opacity="0.5" marker-end="url(#arrow-green)"/>

  <!-- ==================== SHARED LAYER ==================== -->
  <rect x="140" y="116" width="520" height="48" rx="3" fill="#12121a" stroke="#2a2a3a" stroke-width="0.8"/>
  <rect x="140" y="116" width="520" height="18" rx="3" fill="#1a1a28"/>
  <line x1="140" y1="134" x2="660" y2="134" stroke="#2a2a3a" stroke-width="0.5"/>
  <text x="152" y="130" fill="#00d4ff" font-size="8" font-weight="bold" letter-spacing="1">SHARED INFRASTRUCTURE</text>
  <text x="648" y="130" fill="#8888a0" font-size="7" text-anchor="end">LAZY-LOADED</text>
  <text x="170" y="152" fill="#e0e0e8" font-size="9">spaCy NLP models</text>
  <text x="380" y="152" fill="#e0e0e8" font-size="9">Marker registry</text>
  <text x="560" y="152" fill="#e0e0e8" font-size="9">EN / JA</text>

  <!-- Fork arrows -->
  <line x1="300" y1="164" x2="220" y2="194" stroke="#00ffa3" stroke-width="1" opacity="0.4" marker-end="url(#arrow-green)"/>
  <line x1="500" y1="164" x2="580" y2="194" stroke="#00ffa3" stroke-width="1" opacity="0.4" marker-end="url(#arrow-green)"/>

  <!-- ==================== LEFT: THREAT FILTER ==================== -->
  <rect x="40" y="198" width="320" height="172" rx="4" fill="none" stroke="#00ffa3" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="52" y="214" fill="#00ffa3" font-size="9" font-weight="bold" letter-spacing="1">THREAT FILTER</text>
  <text x="348" y="214" fill="#8888a0" font-size="7" text-anchor="end">0–100 SCORE</text>

  <!-- Tech layer -->
  <rect x="56" y="224" width="288" height="52" rx="3" fill="#12121a" stroke="#00ffa3" stroke-width="0.6" opacity="0.7"/>
  <text x="68" y="242" fill="#00ffa3" font-size="9" font-weight="bold">TECH LAYER</text>
  <text x="332" y="242" fill="#00ffa3" font-size="8" text-anchor="end">60%</text>
  <text x="68" y="264" fill="#8888a0" font-size="8">7 dimensions · weighted composite · deterministic</text>

  <!-- Heuristic layer -->
  <rect x="56" y="284" width="288" height="36" rx="3" fill="#12121a" stroke="#8888a0" stroke-width="0.5"/>
  <text x="68" y="306" fill="#8888a0" font-size="9">HEURISTIC LAYER</text>
  <text x="332" y="306" fill="#8888a0" font-size="8" text-anchor="end">40%</text>

  <!-- Output: ThreatResult -->
  <rect x="56" y="328" width="288" height="32" rx="3" fill="#12121a" stroke="#00ffa3" stroke-width="0.6" opacity="0.6"/>
  <text x="200" y="348" fill="#e0e0e8" font-size="9" text-anchor="middle">→ ThreatResult (frozen dataclass)</text>

  <!-- Internal arrows -->
  <line x1="200" y1="276" x2="200" y2="282" stroke="#8888a0" stroke-width="0.5" opacity="0.4"/>
  <line x1="200" y1="320" x2="200" y2="326" stroke="#8888a0" stroke-width="0.5" opacity="0.4"/>

  <!-- ==================== RIGHT: TOPOLOGY MODULE ==================== -->
  <rect x="440" y="198" width="320" height="172" rx="4" fill="none" stroke="#00d4ff" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="452" y="214" fill="#00d4ff" font-size="9" font-weight="bold" letter-spacing="1">TOPOLOGY MODULE</text>
  <text x="748" y="214" fill="#8888a0" font-size="7" text-anchor="end">CLAIM GRAPH</text>

  <!-- Extraction -->
  <rect x="456" y="224" width="288" height="52" rx="3" fill="#12121a" stroke="#00d4ff" stroke-width="0.6" opacity="0.7"/>
  <text x="468" y="242" fill="#00d4ff" font-size="9" font-weight="bold">CLAIM EXTRACTION</text>
  <text x="468" y="264" fill="#8888a0" font-size="8">Tier 0: Rule · Tier 1: Anthropic · Tier 2: Ollama</text>

  <!-- Classification -->
  <rect x="456" y="284" width="288" height="36" rx="3" fill="#12121a" stroke="#00d4ff" stroke-width="0.5" opacity="0.6"/>
  <text x="468" y="306" fill="#00d4ff" font-size="9">4-AXIS CLASSIFICATION</text>
  <text x="732" y="306" fill="#8888a0" font-size="7" text-anchor="end">MACRO/MESO/MICRO</text>

  <!-- Output: TopologyResult -->
  <rect x="456" y="328" width="288" height="32" rx="3" fill="#12121a" stroke="#00d4ff" stroke-width="0.6" opacity="0.6"/>
  <text x="600" y="348" fill="#e0e0e8" font-size="9" text-anchor="middle">→ TopologyResult (SVG / JSON)</text>

  <!-- Internal arrows -->
  <line x1="600" y1="276" x2="600" y2="282" stroke="#8888a0" stroke-width="0.5" opacity="0.4"/>
  <line x1="600" y1="320" x2="600" y2="326" stroke="#8888a0" stroke-width="0.5" opacity="0.4"/>

  <!-- ==================== OUTPUT ROW ==================== -->
  <line x1="200" y1="360" x2="200" y2="388" stroke="#00ffa3" stroke-width="1" opacity="0.4" marker-end="url(#arrow-green)"/>
  <line x1="600" y1="360" x2="600" y2="388" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>

  <rect x="56" y="390" width="288" height="28" rx="3" fill="#12121a" stroke="#2a2a3a" stroke-width="0.5"/>
  <text x="200" y="408" fill="#8888a0" font-size="8" text-anchor="middle">CLI · REST API · Quick-Check Skill</text>

  <rect x="456" y="390" width="288" height="28" rx="3" fill="#12121a" stroke="#2a2a3a" stroke-width="0.5"/>
  <text x="600" y="408" fill="#8888a0" font-size="8" text-anchor="middle">CLI · SVG renderer · JSON export</text>

  <!-- Classification badge -->
  <rect x="28" y="424" width="64" height="12" rx="2" fill="none" stroke="#00ffa3" stroke-width="0.5" opacity="0.3"/>
  <text x="60" y="433" fill="#00ffa3" font-size="7" text-anchor="middle" opacity="0.5">OPEN</text>
</svg>
