<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="'Courier New','Lucida Console',monospace">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#fff" opacity="0.015"/>
    </pattern>
    <linearGradient id="bar-track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a28"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="#0a0a0f"/>
  <rect width="800" height="320" fill="url(#scan)"/>

  <!-- HUD Frame -->
  <path d="M 24 8 L 8 8 L 8 36" stroke="#00ffa3" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 776 8 L 792 8 L 792 36" stroke="#00ffa3" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 8 288 L 8 312 L 24 312" stroke="#00ffa3" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 792 288 L 792 312 L 776 312" stroke="#00ffa3" stroke-width="1.5" fill="none" opacity="0.5"/>
  <rect x="4" y="4" width="792" height="312" rx="2" fill="none" stroke="#2a2a3a" stroke-width="0.5"/>

  <!-- Title bar -->
  <line x1="20" y1="44" x2="780" y2="44" stroke="#2a2a3a" stroke-width="0.5"/>
  <text x="28" y="30" fill="#00ffa3" font-size="11" font-weight="bold" letter-spacing="2">SI-PROTOCOLS // ANALYSIS PIPELINE</text>
  <text x="772" y="30" fill="#8888a0" font-size="9" text-anchor="end" letter-spacing="1">SYSTEM SCHEMATIC</text>

  <!-- ==================== INPUT TERMINAL (left) ==================== -->
  <g transform="translate(24,58)">
    <rect x="0" y="0" width="136" height="200" rx="3" fill="#12121a" stroke="#2a2a3a" stroke-width="0.8"/>
    <!-- Terminal title bar -->
    <rect x="0" y="0" width="136" height="20" rx="3" fill="#1a1a28"/>
    <line x1="0" y1="20" x2="136" y2="20" stroke="#2a2a3a" stroke-width="0.5"/>
    <circle cx="10" cy="10" r="3" fill="#ff4444" opacity="0.5"/>
    <circle cx="22" cy="10" r="3" fill="#ffaa00" opacity="0.5"/>
    <circle cx="34" cy="10" r="3" fill="#00ffa3" opacity="0.5"/>
    <text x="50" y="14" fill="#8888a0" font-size="7" letter-spacing="1">input.txt</text>

    <!-- Simulated text lines -->
    <g opacity="0.35">
      <rect x="10" y="28" width="105" height="3" rx="1" fill="#e0e0e8"/>
      <rect x="10" y="37" width="85" height="3" rx="1" fill="#e0e0e8"/>
      <rect x="10" y="46" width="116" height="3" rx="1" fill="#e0e0e8"/>
      <rect x="10" y="55" width="72" height="3" rx="1" fill="#e0e0e8"/>
      <rect x="10" y="64" width="98" height="3" rx="1" fill="#e0e0e8"/>
      <rect x="10" y="73" width="60" height="3" rx="1" fill="#e0e0e8"/>
      <rect x="10" y="82" width="110" height="3" rx="1" fill="#e0e0e8"/>
      <rect x="10" y="91" width="80" height="3" rx="1" fill="#e0e0e8"/>
      <rect x="10" y="100" width="95" height="3" rx="1" fill="#e0e0e8"/>
      <rect x="10" y="109" width="55" height="3" rx="1" fill="#e0e0e8"/>
      <rect x="10" y="118" width="108" height="3" rx="1" fill="#e0e0e8"/>
      <rect x="10" y="127" width="70" height="3" rx="1" fill="#e0e0e8"/>
      <rect x="10" y="136" width="100" height="3" rx="1" fill="#e0e0e8"/>
      <rect x="10" y="145" width="88" height="3" rx="1" fill="#e0e0e8"/>
      <rect x="10" y="154" width="115" height="3" rx="1" fill="#e0e0e8"/>
      <rect x="10" y="163" width="65" height="3" rx="1" fill="#e0e0e8"/>
    </g>

    <!-- Cursor -->
    <rect x="10" y="174" width="7" height="12" rx="1" fill="#00ffa3" opacity="0.6"/>

    <!-- Label below -->
    <text x="68" y="198" fill="#8888a0" font-size="7" text-anchor="middle" letter-spacing="1.5">TEXT INPUT</text>
  </g>

  <!-- ==================== ARROW: INPUT → CHANNELS ==================== -->
  <g stroke="#00ffa3" stroke-width="1" opacity="0.35">
    <line x1="166" y1="158" x2="216" y2="158" stroke-dasharray="4,3"/>
    <polygon points="216,158 210,154 210,162" fill="#00ffa3"/>
  </g>

  <!-- ==================== ANALYSIS CHANNELS (centre) ==================== -->
  <!-- Channel frame -->
  <rect x="222" y="54" width="330" height="212" rx="3" fill="none" stroke="#2a2a3a" stroke-width="0.5" stroke-dasharray="6,3" opacity="0.4"/>
  <text x="387" y="50" fill="#8888a0" font-size="7" text-anchor="middle" letter-spacing="2" opacity="0.5">MULTI-DIMENSIONAL ANALYSIS</text>

  <!-- Channel 1: VAGUENESS -->
  <g transform="translate(230,62)">
    <rect x="0" y="0" width="314" height="22" rx="2" fill="#12121a" stroke="#2a2a3a" stroke-width="0.4"/>
    <text x="8" y="15" fill="#8888a0" font-size="7.5" letter-spacing="1">VAGUENESS</text>
    <rect x="95" y="5" width="205" height="12" rx="1.5" fill="url(#bar-track)"/>
    <rect x="95" y="5" width="148" height="12" rx="1.5" fill="#00ffa3" opacity="0.35"/>
    <text x="305" y="15" fill="#00d4ff" font-size="7" text-anchor="end" font-weight="bold">72%</text>
  </g>

  <!-- Channel 2: AUTHORITY -->
  <g transform="translate(230,90)">
    <rect x="0" y="0" width="314" height="22" rx="2" fill="#12121a" stroke="#2a2a3a" stroke-width="0.4"/>
    <text x="8" y="15" fill="#8888a0" font-size="7.5" letter-spacing="1">AUTHORITY</text>
    <rect x="95" y="5" width="205" height="12" rx="1.5" fill="url(#bar-track)"/>
    <rect x="95" y="5" width="174" height="12" rx="1.5" fill="#00ffa3" opacity="0.4"/>
    <text x="305" y="15" fill="#00d4ff" font-size="7" text-anchor="end" font-weight="bold">85%</text>
  </g>

  <!-- Channel 3: URGENCY -->
  <g transform="translate(230,118)">
    <rect x="0" y="0" width="314" height="22" rx="2" fill="#12121a" stroke="#2a2a3a" stroke-width="0.4"/>
    <text x="8" y="15" fill="#8888a0" font-size="7.5" letter-spacing="1">URGENCY</text>
    <rect x="95" y="5" width="205" height="12" rx="1.5" fill="url(#bar-track)"/>
    <rect x="95" y="5" width="113" height="12" rx="1.5" fill="#00ffa3" opacity="0.3"/>
    <text x="305" y="15" fill="#00d4ff" font-size="7" text-anchor="end" font-weight="bold">55%</text>
  </g>

  <!-- Channel 4: EMOTION -->
  <g transform="translate(230,146)">
    <rect x="0" y="0" width="314" height="22" rx="2" fill="#12121a" stroke="#2a2a3a" stroke-width="0.4"/>
    <text x="8" y="15" fill="#ffaa00" font-size="7.5" letter-spacing="1">EMOTION</text>
    <rect x="95" y="5" width="205" height="12" rx="1.5" fill="url(#bar-track)"/>
    <rect x="95" y="5" width="180" height="12" rx="1.5" fill="#ffaa00" opacity="0.35"/>
    <text x="305" y="15" fill="#ffaa00" font-size="7" text-anchor="end" font-weight="bold">88%</text>
  </g>

  <!-- Channel 5: CONTRADICTION -->
  <g transform="translate(230,174)">
    <rect x="0" y="0" width="314" height="22" rx="2" fill="#12121a" stroke="#2a2a3a" stroke-width="0.4"/>
    <text x="8" y="15" fill="#8888a0" font-size="7.5" letter-spacing="1">CONTRADICTION</text>
    <rect x="95" y="5" width="205" height="12" rx="1.5" fill="url(#bar-track)"/>
    <rect x="95" y="5" width="82" height="12" rx="1.5" fill="#00ffa3" opacity="0.25"/>
    <text x="305" y="15" fill="#00d4ff" font-size="7" text-anchor="end" font-weight="bold">40%</text>
  </g>

  <!-- Channel 6: SOURCE -->
  <g transform="translate(230,202)">
    <rect x="0" y="0" width="314" height="22" rx="2" fill="#12121a" stroke="#2a2a3a" stroke-width="0.4"/>
    <text x="8" y="15" fill="#8888a0" font-size="7.5" letter-spacing="1">SOURCE</text>
    <rect x="95" y="5" width="205" height="12" rx="1.5" fill="url(#bar-track)"/>
    <rect x="95" y="5" width="139" height="12" rx="1.5" fill="#00ffa3" opacity="0.3"/>
    <text x="305" y="15" fill="#00d4ff" font-size="7" text-anchor="end" font-weight="bold">68%</text>
  </g>

  <!-- Channel 7: ESCALATION -->
  <g transform="translate(230,230)">
    <rect x="0" y="0" width="314" height="22" rx="2" fill="#12121a" stroke="#2a2a3a" stroke-width="0.4"/>
    <text x="8" y="15" fill="#8888a0" font-size="7.5" letter-spacing="1">ESCALATION</text>
    <rect x="95" y="5" width="205" height="12" rx="1.5" fill="url(#bar-track)"/>
    <rect x="95" y="5" width="103" height="12" rx="1.5" fill="#00ffa3" opacity="0.28"/>
    <text x="305" y="15" fill="#00d4ff" font-size="7" text-anchor="end" font-weight="bold">50%</text>
  </g>

  <!-- ==================== ARROW: CHANNELS → OUTPUT ==================== -->
  <g stroke="#00ffa3" stroke-width="1" opacity="0.35">
    <line x1="558" y1="158" x2="612" y2="158" stroke-dasharray="4,3"/>
    <polygon points="612,158 606,154 606,162" fill="#00ffa3"/>
  </g>

  <!-- ==================== OUTPUT: THREAT SCORE (right) ==================== -->
  <g transform="translate(618,58)">
    <rect x="0" y="0" width="156" height="200" rx="3" fill="#12121a" stroke="#2a2a3a" stroke-width="0.8"/>
    <!-- Header -->
    <rect x="0" y="0" width="156" height="20" rx="3" fill="#1a1a28"/>
    <line x1="0" y1="20" x2="156" y2="20" stroke="#2a2a3a" stroke-width="0.5"/>
    <text x="78" y="14" fill="#8888a0" font-size="7" text-anchor="middle" letter-spacing="1.5">THREAT ASSESSMENT</text>

    <!-- Circular gauge -->
    <!-- Track (background ring) -->
    <circle cx="78" cy="100" r="48" fill="none" stroke="#1a1a28" stroke-width="7"/>
    <!-- Score arc (70%) — circumference=301.6, 70%=211.1 -->
    <circle cx="78" cy="100" r="48" fill="none" stroke="#00ffa3" stroke-width="7"
      stroke-dasharray="211 91" stroke-linecap="round"
      transform="rotate(-90,78,100)" filter="url(#glow)" opacity="0.8"/>
    <!-- Inner circle -->
    <circle cx="78" cy="100" r="36" fill="none" stroke="#2a2a3a" stroke-width="0.5"/>

    <!-- Score number -->
    <text x="78" y="96" fill="#e0e0e8" font-size="28" font-weight="bold" text-anchor="middle">70</text>
    <text x="78" y="110" fill="#8888a0" font-size="8" text-anchor="middle" letter-spacing="1">/100</text>

    <!-- Threat level label -->
    <rect x="24" y="158" width="108" height="18" rx="2" fill="none" stroke="#ffaa00" stroke-width="0.8" opacity="0.6"/>
    <text x="78" y="171" fill="#ffaa00" font-size="8" text-anchor="middle" font-weight="bold" letter-spacing="1.5" opacity="0.8">ELEVATED</text>

    <!-- Label -->
    <text x="78" y="196" fill="#8888a0" font-size="7" text-anchor="middle" letter-spacing="1.5">COMPOSITE SCORE</text>
  </g>

  <!-- ==================== Status bar ==================== -->
  <circle cx="658" cy="302" r="3" fill="#00ffa3" opacity="0.8"/>
  <text x="668" y="306" fill="#8888a0" font-size="9" letter-spacing="1">PIPELINE ACTIVE</text>

  <!-- Classification -->
  <rect x="28" y="296" width="90" height="18" rx="2" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <text x="73" y="309" fill="#00d4ff" font-size="8" text-anchor="middle" font-weight="bold" letter-spacing="2" opacity="0.6">OVERVIEW</text>

  <!-- Decorative corner dots -->
  <circle cx="20" cy="300" r="1.5" fill="#00ffa3" opacity="0.3"/>
  <circle cx="780" cy="300" r="1.5" fill="#00ffa3" opacity="0.3"/>
</svg>
