<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Courier New','Lucida Console',monospace">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#fff" opacity="0.015"/>
    </pattern>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff4444" opacity="0.8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffa3" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="#0a0a0f"/>
  <rect width="900" height="560" fill="url(#scan)"/>

  <!-- HUD Frame corners -->
  <path d="M 24 8 L 8 8 L 8 36" stroke="#00ffa3" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 876 8 L 892 8 L 892 36" stroke="#00ffa3" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 8 528 L 8 552 L 24 552" stroke="#00ffa3" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 892 528 L 892 552 L 876 552" stroke="#00ffa3" stroke-width="1.5" fill="none" opacity="0.5"/>
  <rect x="4" y="4" width="892" height="552" rx="2" fill="none" stroke="#2a2a3a" stroke-width="0.5"/>

  <!-- Title bar -->
  <line x1="20" y1="44" x2="880" y2="44" stroke="#2a2a3a" stroke-width="0.5"/>
  <text x="28" y="30" fill="#00ffa3" font-size="11" font-weight="bold" letter-spacing="2">SI-PROTOCOLS // THE CONTAINER TRAP</text>
  <text x="872" y="30" fill="#8888a0" font-size="9" text-anchor="end" letter-spacing="1">MIGRATION vs ESCAPE</text>

  <!-- Divider line -->
  <line x1="450" y1="54" x2="450" y2="500" stroke="#2a2a3a" stroke-width="0.5" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- ========== LEFT HALF: Container Migration (bad) ========== -->
  <text x="225" y="72" fill="#ff4444" font-size="10" text-anchor="middle" letter-spacing="2" font-weight="bold">CONTAINER MIGRATION</text>
  <text x="225" y="88" fill="#8888a0" font-size="8" text-anchor="middle">Lateral movement — same layer</text>

  <!-- Container A -->
  <rect x="50" y="130" width="150" height="120" rx="4" fill="#12121a" stroke="#ff4444" stroke-width="1" opacity="0.9"/>
  <rect x="50" y="130" width="150" height="20" rx="4" fill="#1a1a28"/>
  <line x1="50" y1="150" x2="200" y2="150" stroke="#ff4444" stroke-width="0.4" opacity="0.5"/>
  <text x="125" y="144" fill="#ff4444" font-size="8" text-anchor="middle" letter-spacing="1" font-weight="bold">CONTAINER A</text>
  <text x="65" y="170" fill="#8888a0" font-size="7.5">Mainstream Dogma</text>
  <text x="65" y="184" fill="#8888a0" font-size="7.5">Social norms v1</text>
  <text x="65" y="198" fill="#8888a0" font-size="7.5">Cultural container</text>
  <text x="65" y="218" fill="#ff4444" font-size="7" opacity="0.6">[ restrictive ]</text>

  <!-- Lateral arrow -->
  <line x1="210" y1="190" x2="240" y2="190" stroke="#ff4444" stroke-width="1.5" opacity="0.7" marker-end="url(#arrow-red)"/>
  <line x1="200" y1="190" x2="250" y2="190" stroke="#ff4444" stroke-width="1.5" opacity="0.7" marker-end="url(#arrow-red)"/>

  <!-- Container B -->
  <rect x="260" y="130" width="150" height="120" rx="4" fill="#12121a" stroke="#ff4444" stroke-width="1" opacity="0.9"/>
  <rect x="260" y="130" width="150" height="20" rx="4" fill="#1a1a28"/>
  <line x1="260" y1="150" x2="410" y2="150" stroke="#ff4444" stroke-width="0.4" opacity="0.5"/>
  <text x="335" y="144" fill="#ff4444" font-size="8" text-anchor="middle" letter-spacing="1" font-weight="bold">CONTAINER B</text>
  <text x="275" y="170" fill="#8888a0" font-size="7.5">Pseudo-Spiritual Dogma</text>
  <text x="275" y="184" fill="#8888a0" font-size="7.5">Social norms v2</text>
  <text x="275" y="198" fill="#8888a0" font-size="7.5">New-age container</text>
  <text x="275" y="218" fill="#ff4444" font-size="7" opacity="0.6">[ still restrictive ]</text>

  <!-- Same layer indicator -->
  <line x1="50" y1="260" x2="410" y2="260" stroke="#ff4444" stroke-width="0.6" opacity="0.4" stroke-dasharray="3,3"/>
  <text x="225" y="276" fill="#ff4444" font-size="7.5" text-anchor="middle" opacity="0.7">SAME ABSTRACTION LAYER — ILLUSION LAYER</text>

  <!-- Warning box -->
  <rect x="60" y="300" width="340" height="86" rx="3" fill="#12121a" stroke="#ff4444" stroke-width="0.8" opacity="0.8"/>
  <text x="80" y="320" fill="#ff4444" font-size="9" font-weight="bold" letter-spacing="1">WARNING</text>
  <text x="80" y="338" fill="#8888a0" font-size="8">The container changes; the restriction</text>
  <text x="80" y="352" fill="#8888a0" font-size="8">remains. "Spiritual awakening" is often</text>
  <text x="80" y="366" fill="#8888a0" font-size="8">marketed as a system upgrade but is</text>
  <text x="80" y="380" fill="#8888a0" font-size="8">frequently just a container migration.</text>
  <!-- Warning icon -->
  <polygon points="392,308 404,328 380,328" fill="none" stroke="#ff4444" stroke-width="1.2" opacity="0.7"/>
  <text x="392" y="326" fill="#ff4444" font-size="9" text-anchor="middle" font-weight="bold">!</text>

  <!-- ========== RIGHT HALF: Container Escape (good) ========== -->
  <text x="675" y="72" fill="#00ffa3" font-size="10" text-anchor="middle" letter-spacing="2" font-weight="bold">CONTAINER ESCAPE</text>
  <text x="675" y="88" fill="#8888a0" font-size="8" text-anchor="middle">Vertical movement — breaks through layers</text>

  <!-- Container (top) -->
  <rect x="600" y="110" width="150" height="70" rx="4" fill="#12121a" stroke="#ff4444" stroke-width="0.8" opacity="0.6"/>
  <rect x="600" y="110" width="150" height="18" rx="4" fill="#1a1a28"/>
  <line x1="600" y1="128" x2="750" y2="128" stroke="#ff4444" stroke-width="0.3" opacity="0.4"/>
  <text x="675" y="124" fill="#ff4444" font-size="7" text-anchor="middle" letter-spacing="1" opacity="0.6">CONTAINER LAYER</text>
  <text x="615" y="146" fill="#8888a0" font-size="7" opacity="0.5">Illusion / dogma</text>
  <text x="615" y="160" fill="#8888a0" font-size="7" opacity="0.5">[ bypassed ]</text>

  <!-- Escape arrow (vertical, breaking through) -->
  <line x1="675" y1="180" x2="675" y2="230" stroke="#00ffa3" stroke-width="2" opacity="0.8" marker-end="url(#arrow-green)"/>

  <!-- Break-through effect -->
  <line x1="660" y1="186" x2="652" y2="178" stroke="#00ffa3" stroke-width="1" opacity="0.4"/>
  <line x1="690" y1="186" x2="698" y2="178" stroke="#00ffa3" stroke-width="1" opacity="0.4"/>
  <line x1="665" y1="192" x2="658" y2="196" stroke="#00ffa3" stroke-width="0.8" opacity="0.3"/>
  <line x1="685" y1="192" x2="692" y2="196" stroke="#00ffa3" stroke-width="0.8" opacity="0.3"/>

  <!-- VM Kernel layer -->
  <rect x="580" y="236" width="190" height="60" rx="4" fill="#12121a" stroke="#ffaa00" stroke-width="1" opacity="0.9"/>
  <rect x="580" y="236" width="190" height="18" rx="4" fill="#1a1a28"/>
  <line x1="580" y1="254" x2="770" y2="254" stroke="#ffaa00" stroke-width="0.4" opacity="0.5"/>
  <text x="675" y="250" fill="#ffaa00" font-size="8" text-anchor="middle" letter-spacing="1" font-weight="bold">VM KERNEL</text>
  <text x="595" y="272" fill="#8888a0" font-size="7.5">Direct ego processing</text>
  <text x="595" y="286" fill="#8888a0" font-size="7.5">Unfiltered by containers</text>

  <!-- Arrow down to SAN -->
  <line x1="675" y1="296" x2="675" y2="330" stroke="#00ffa3" stroke-width="2" opacity="0.8" marker-end="url(#arrow-green)"/>

  <!-- SAN layer -->
  <rect x="580" y="336" width="190" height="60" rx="4" fill="#12121a" stroke="#00ffa3" stroke-width="1.2" opacity="0.9" filter="url(#glow-soft)"/>
  <rect x="580" y="336" width="190" height="18" rx="4" fill="#1a1a28"/>
  <line x1="580" y1="354" x2="770" y2="354" stroke="#00ffa3" stroke-width="0.4" opacity="0.5"/>
  <text x="675" y="350" fill="#00ffa3" font-size="8" text-anchor="middle" letter-spacing="1" font-weight="bold">SAN / GENETIC REPOSITORY</text>
  <text x="595" y="372" fill="#8888a0" font-size="7.5">Direct SAN access restored</text>
  <text x="595" y="386" fill="#8888a0" font-size="7.5">Read-write to shared storage</text>

  <!-- Success box -->
  <rect x="490" y="416" width="340" height="70" rx="3" fill="#12121a" stroke="#00ffa3" stroke-width="0.8" opacity="0.8"/>
  <text x="510" y="436" fill="#00ffa3" font-size="9" font-weight="bold" letter-spacing="1">RESULT</text>
  <text x="510" y="454" fill="#8888a0" font-size="8">True autonomy requires accessing a</text>
  <text x="510" y="468" fill="#8888a0" font-size="8">different layer of the stack entirely —</text>
  <text x="510" y="482" fill="#8888a0" font-size="8">not swapping one container for another.</text>
  <!-- Checkmark -->
  <circle cx="820" cy="428" r="10" fill="none" stroke="#00ffa3" stroke-width="1" opacity="0.6"/>
  <path d="M 814 428 L 818 432 L 826 424" fill="none" stroke="#00ffa3" stroke-width="1.5" opacity="0.8"/>

  <!-- Status -->
  <text x="872" y="544" fill="#8888a0" font-size="8" text-anchor="end" letter-spacing="1" opacity="0.5">CVP v1.0 // CONTAINER ANALYSIS</text>
</svg>
