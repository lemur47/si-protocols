<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'Courier New','Lucida Console',monospace">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#fff" opacity="0.015"/>
    </pattern>
    <linearGradient id="step-fill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ffa3" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ff4444" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="danger-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ffa3"/>
      <stop offset="40%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ff4444"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="440" fill="#0a0a0f"/>
  <rect width="800" height="440" fill="url(#scan)"/>

  <!-- HUD Frame -->
  <path d="M 24 8 L 8 8 L 8 36" stroke="#00ffa3" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 776 8 L 792 8 L 792 36" stroke="#00ffa3" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 8 408 L 8 432 L 24 432" stroke="#00ffa3" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 792 408 L 792 432 L 776 432" stroke="#00ffa3" stroke-width="1.5" fill="none" opacity="0.5"/>
  <rect x="4" y="4" width="792" height="432" rx="2" fill="none" stroke="#2a2a3a" stroke-width="0.5"/>

  <!-- Title bar -->
  <line x1="20" y1="44" x2="780" y2="44" stroke="#2a2a3a" stroke-width="0.5"/>
  <text x="28" y="30" fill="#00ffa3" font-size="11" font-weight="bold" letter-spacing="2">SI-PROTOCOLS // COMMITMENT ESCALATION PATTERN</text>
  <text x="772" y="30" fill="#8888a0" font-size="9" text-anchor="end" letter-spacing="1">FOOT-IN-THE-DOOR</text>

  <!-- Staircase steps (ascending from bottom-left to top-right) -->

  <!-- Step 1: Free content (lowest, leftmost) -->
  <g transform="translate(60,320)">
    <rect x="0" y="0" width="140" height="60" rx="2" fill="#12121a" stroke="#00ffa3" stroke-width="1" opacity="0.8"/>
    <rect x="0" y="0" width="4" height="60" rx="1" fill="#00ffa3" opacity="0.5"/>
    <text x="14" y="16" fill="#00ffa3" font-size="8" font-weight="bold" letter-spacing="1.5">LVL 01</text>
    <text x="14" y="32" fill="#e0e0e8" font-size="9" font-weight="bold">Free content</text>
    <text x="14" y="48" fill="#8888a0" font-size="8">Open access · $0</text>
  </g>

  <!-- Connector 1→2 -->
  <line x1="200" y1="340" x2="220" y2="290" stroke="#00ffa3" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <polygon points="220,290 216,298 224,298" fill="#00ffa3" opacity="0.4"/>

  <!-- Step 2: Small ask -->
  <g transform="translate(200,255)">
    <rect x="0" y="0" width="140" height="60" rx="2" fill="#12121a" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
    <rect x="0" y="0" width="4" height="60" rx="1" fill="#00d4ff" opacity="0.5"/>
    <text x="14" y="16" fill="#00d4ff" font-size="8" font-weight="bold" letter-spacing="1.5">LVL 02</text>
    <text x="14" y="32" fill="#e0e0e8" font-size="9" font-weight="bold">Newsletter · email</text>
    <text x="14" y="48" fill="#8888a0" font-size="8">Personal data · $0</text>
  </g>

  <!-- Connector 2→3 -->
  <line x1="340" y1="275" x2="360" y2="225" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <polygon points="360,225 356,233 364,233" fill="#00d4ff" opacity="0.4"/>

  <!-- Step 3: Paid workshop -->
  <g transform="translate(340,190)">
    <rect x="0" y="0" width="140" height="60" rx="2" fill="#12121a" stroke="#ffaa00" stroke-width="1" opacity="0.8"/>
    <rect x="0" y="0" width="4" height="60" rx="1" fill="#ffaa00" opacity="0.5"/>
    <text x="14" y="16" fill="#ffaa00" font-size="8" font-weight="bold" letter-spacing="1.5">LVL 03</text>
    <text x="14" y="32" fill="#e0e0e8" font-size="9" font-weight="bold">Paid workshop</text>
    <text x="14" y="48" fill="#8888a0" font-size="8">Financial · $$</text>
  </g>

  <!-- Connector 3→4 -->
  <line x1="480" y1="210" x2="500" y2="160" stroke="#ffaa00" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <polygon points="500,160 496,168 504,168" fill="#ffaa00" opacity="0.4"/>

  <!-- Step 4: Inner circle -->
  <g transform="translate(480,125)">
    <rect x="0" y="0" width="140" height="60" rx="2" fill="#12121a" stroke="#ff6b6b" stroke-width="1" opacity="0.8"/>
    <rect x="0" y="0" width="4" height="60" rx="1" fill="#ff6b6b" opacity="0.5"/>
    <text x="14" y="16" fill="#ff6b6b" font-size="8" font-weight="bold" letter-spacing="1.5">LVL 04</text>
    <text x="14" y="32" fill="#e0e0e8" font-size="9" font-weight="bold">Inner circle</text>
    <text x="14" y="48" fill="#8888a0" font-size="8">Social isolation · $$$</text>
  </g>

  <!-- Connector 4→5 -->
  <line x1="620" y1="145" x2="640" y2="95" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <polygon points="640,95 636,103 644,103" fill="#ff6b6b" opacity="0.4"/>

  <!-- Step 5: Total dependency -->
  <g transform="translate(620,60)">
    <rect x="0" y="0" width="150" height="60" rx="2" fill="#12121a" stroke="#ff4444" stroke-width="1.5" opacity="0.9"/>
    <rect x="0" y="0" width="4" height="60" rx="1" fill="#ff4444" opacity="0.7"/>
    <text x="14" y="16" fill="#ff4444" font-size="8" font-weight="bold" letter-spacing="1.5">LVL 05 ⚠</text>
    <text x="14" y="32" fill="#e0e0e8" font-size="9" font-weight="bold">Total dependency</text>
    <text x="14" y="48" fill="#8888a0" font-size="8">Full control · $$$$</text>
  </g>

  <!-- Danger gradient bar at bottom -->
  <text x="100" y="405" fill="#8888a0" font-size="8" letter-spacing="1.5">LOW RISK</text>
  <rect x="170" y="396" width="460" height="6" rx="3" fill="#1a1a28"/>
  <rect x="170" y="396" width="460" height="6" rx="3" fill="url(#danger-grad)" opacity="0.6"/>
  <text x="645" y="405" fill="#8888a0" font-size="8" letter-spacing="1.5">HIGH RISK</text>

  <!-- Lock icons (increasing restriction) -->
  <g fill="none" stroke-width="1.2" opacity="0.5">
    <!-- Open lock at step 1 -->
    <g transform="translate(170,330)" stroke="#00ffa3">
      <rect x="0" y="6" width="12" height="10" rx="1.5"/>
      <path d="M 3 6 L 3 3 A 3 3 0 0 1 9 3 L 9 4" fill="none"/>
    </g>
    <!-- Closed lock at step 4 -->
    <g transform="translate(590,135)" stroke="#ff6b6b">
      <rect x="0" y="6" width="12" height="10" rx="1.5"/>
      <path d="M 3 6 L 3 3 A 3 3 0 0 1 9 3 L 9 6" fill="none"/>
    </g>
    <!-- Closed lock at step 5 -->
    <g transform="translate(740,70)" stroke="#ff4444">
      <rect x="0" y="6" width="12" height="10" rx="1.5"/>
      <path d="M 3 6 L 3 3 A 3 3 0 0 1 9 3 L 9 6" fill="none"/>
      <circle cx="6" cy="11" r="1.5" fill="#ff4444"/>
    </g>
  </g>

  <!-- Arrow label showing escalation direction -->
  <g transform="translate(50,60)" opacity="0.4">
    <text x="0" y="0" fill="#8888a0" font-size="8" letter-spacing="2" transform="rotate(90)">COMMITMENT ──▶</text>
  </g>

  <!-- Classification -->
  <rect x="28" y="418" width="100" height="18" rx="2" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.6"/>
  <text x="78" y="431" fill="#ff6b6b" font-size="8" text-anchor="middle" font-weight="bold" letter-spacing="2" opacity="0.7">WARNING</text>

  <!-- Status -->
  <circle cx="700" cy="426" r="3" fill="#ffaa00" opacity="0.8"/>
  <text x="710" y="430" fill="#8888a0" font-size="9" letter-spacing="1">PATTERN MAPPED</text>
</svg>
